name: skill_roadmap
description: AI-powered course suggestion & learning platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  video_player: ^2.8.0
  chewie: ^1.6.0
  flutter_markdown: ^0.6.18
  lottie: ^2.7.0
  flutter_svg: ^2.0.9
  intl: ^0.18.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  url_launcher: ^6.2.1
  shared_preferences: ^2.2.2
  share_plus: ^7.0.0
  confetti: ^0.7.0
dev_dependencies:
  flutter_launcher_icons: "^0.14.0"
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true          # Generate Android icons
  ios: true              # Generate iOS icons
  image_path: "assets/icons/app_icon.png"   # Your source image (recommended: 1024x1024)
